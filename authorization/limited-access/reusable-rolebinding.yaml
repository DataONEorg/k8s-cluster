apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: "${SERVICE_ACCOUNT}-rb"   # Name of shared SA in the shared namespace
  namespace: "$TARGET_NAMESPACE"  # Target namespace where access is being granted
subjects:
  - kind: ServiceAccount
    name: "$SERVICE_ACCOUNT"      # Name of shared SA
    namespace: shared             # The namespace where the shared SA actually exists
roleRef:
  kind: ClusterRole
  name: "limited:${SERVICE_ACCOUNT}"
  apiGroup: rbac.authorization.k8s.io
